<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Import Tasks to SharePoint</title>
<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
  body { font-family: sans-serif; background: #0d1117; color: #e6edf3; padding: 40px; }
  h1 { color: #58a6ff; }
  .btn { background: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 15px; margin: 8px 4px; }
  .btn:hover { background: #2ea043; }
  .btn-blue { background: #1f6feb; }
  .btn-blue:hover { background: #388bfd; }
  .log { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-top: 20px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; }
  .ok { color: #3fb950; }
  .err { color: #f85149; }
  .info { color: #58a6ff; }
  .warn { color: #d29922; }
</style>
</head>
<body>
<h1>📥 Import Tasks → SharePoint List</h1>
<p style="color:#8b949e;">เครื่องมือนี้จะ Import ข้อมูลตัวอย่าง 12 tasks เข้า SharePoint List <code>IT_Tasks</code></p>

<button class="btn btn-blue" onclick="doLogin()">🔐 Login Microsoft ก่อน</button>
<button class="btn" onclick="doImport()">🚀 Import ทั้งหมด</button>
<button class="btn" style="background:#da3633;" onclick="clearLog()">🗑 ล้าง Log</button>

<div class="log" id="log"><span class="info">รอ Login ก่อนครับ...</span></div>

<script>
var SP_CONFIG = {
  clientId:  '9c872787-a9e3-4aee-8c9a-f334044e6b4c',
  tenantId:  '33021451-82a3-41cd-b43e-baf144e67483',
  siteUrl:   'https://costplan1.sharepoint.com/sites/IT760',
  listName:  'IT_Tasks',
};

var SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All'];
var msalApp = null;
var token = null;
var siteId = null;
var listId = null;

function initMsal() {
  if (typeof msal === 'undefined') { setTimeout(initMsal, 100); return; }
  msalApp = new msal.PublicClientApplication({
    auth: {
      clientId: SP_CONFIG.clientId,
      authority: 'https://login.microsoftonline.com/' + SP_CONFIG.tenantId,
      redirectUri: window.location.href.split('?')[0],
    },
    cache: { cacheLocation: 'localStorage' },
  });
  log('info', '✅ MSAL พร้อมใช้งาน — กด Login ก่อนครับ');
}
window.addEventListener('load', initMsal);

function log(type, msg) {
  var el = document.getElementById('log');
  el.innerHTML += '<div class="' + type + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

async function doLogin() {
  try {
    log('info', '🔐 กำลัง Login...');
    var accounts = msalApp.getAllAccounts();
    if (accounts.length > 0) {
      var r = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      token = r.accessToken;
    } else {
      var r = await msalApp.acquireTokenPopup({ scopes: SCOPES });
      token = r.accessToken;
    }
    log('ok', '✅ Login สำเร็จ: ' + msalApp.getAllAccounts()[0].username);
    // Resolve site & list
    log('info', '🔍 กำลังหา SharePoint Site...');
    var hostname = new URL(SP_CONFIG.siteUrl).hostname;
    var sitePath = new URL(SP_CONFIG.siteUrl).pathname;
    var sd = await gfetch('/sites/' + hostname + ':' + sitePath);
    siteId = sd.id;
    log('ok', '✅ Site ID: ' + siteId);
    var lists = await gfetch('/sites/' + siteId + '/lists?$filter=displayName eq \'' + SP_CONFIG.listName + '\'');
    if (!lists.value.length) { log('err', '❌ ไม่พบ List "' + SP_CONFIG.listName + '"'); return; }
    listId = lists.value[0].id;
    log('ok', '✅ List ID: ' + listId);
    log('ok', '🎉 พร้อม Import แล้ว — กด "Import ทั้งหมด" ได้เลยครับ');
  } catch(e) {
    log('err', '❌ Login Error: ' + e.message);
  }
}

async function gfetch(path, method, body) {
  var opts = { method: method || 'GET', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch('https://graph.microsoft.com/v1.0' + path, opts);
  if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
  return res.status === 204 ? null : res.json();
}

var TASKS = [
  {name:'Check CCTV',type:'Routine',priority:'2',start:'2026-03-02',due:'2026-03-03',status:'Done',team:'IT',by:'Noon',note:'เปิด app เช็คกล้องทุกตัว ~5 min',value:null,valueNote:'',subtasks:[]},
  {name:'Check Fortigate',type:'Routine',priority:'2',start:'2026-03-03',due:'2026-03-04',status:'Not Started',team:'IT',by:'Noon',note:'ตรวจสอบ Firewall ประจำเดือน',value:null,valueNote:'',subtasks:[]},
  {name:'Update Notebook Status',type:'Routine',priority:'2',start:'2026-03-01',due:'2026-03-01',status:'Not Started',team:'IT',by:'Noon',note:'',value:null,valueNote:'',subtasks:[]},
  {name:'Email Hosting Renewal — costplan.co.th',type:'Subscription',priority:'1',start:'2026-03-09',due:'2026-03-13',status:'Done',team:'IT',by:'Noon',note:'หมดอายุ 31 Mar 2026',value:26400,valueNote:'Email Plus Extra 100',subtasks:[{label:'ทำเรื่องอนุมัติ',done:true},{label:'ส่งต่อ Admin',done:true},{label:'ส่งต่อ Accountant',done:true}]},
  {name:'Web Hosting Renewal — costplan.co.th',type:'Subscription',priority:'1',start:'2026-03-09',due:'2026-03-13',status:'Not Started',team:'IT',by:'Noon',note:'หมดอายุ 31 Mar 2026',value:1800,valueNote:'Web Hosting Plus/Linux 100MB',subtasks:[]},
  {name:'Zoom Subscription — 3 Accounts',type:'Subscription',priority:'2',start:'2026-03-15',due:'2026-03-23',status:'Not Started',team:'IT',by:'Noon',note:'',value:null,valueNote:'',subtasks:[]},
  {name:'Claude in Excel — Tender Comparison HIS MEP No.1',type:'Project',priority:'1',start:'2026-03-04',due:'2026-03-04',status:'Done',team:'Team Post',by:'Noon',note:'',value:null,valueNote:'',subtasks:[{label:'เตรียมไฟล์ Excel',done:true},{label:'ทำ Comparison Table',done:true},{label:'Summary & Analysis',done:true}]},
  {name:'ระบบ Assign งาน Procurement',type:'Project',priority:'3',start:'2026-03-02',due:'2026-03-20',status:'On Process',team:'Procurement',by:'Noon',note:'ปรับตาม Comment',value:null,valueNote:'',subtasks:[{label:'แก้ไข Form',done:true},{label:'แก้ Team Post รับ Status Done',done:false},{label:'ทดสอบระบบ',done:false}]},
  {name:'Upload Job Description Online',type:'Project',priority:'2',start:'2026-03-01',due:'2026-03-15',status:'On Process',team:'HR',by:'Noon',note:'',value:null,valueNote:'',subtasks:[]},
  {name:'Fortigate Renewal',type:'Subscription',priority:'1',start:'2026-04-03',due:'2026-04-18',status:'Not Started',team:'IT',by:'Noon',note:'Expiry: 18 April 2026',value:null,valueNote:'FortiGate UTM Subscription',subtasks:[]},
  {name:'Office 365 — 6 Licenses',type:'Subscription',priority:'1',start:'2026-09-14',due:'2026-09-18',status:'Not Started',team:'IT',by:'Noon',note:'Expiry: 30 Sep 2026',value:18720,valueNote:'MS Office 365 Business Basic 6 users',subtasks:[]},
  {name:'Notebook อร — เปลี่ยนแบตเตอรี่',type:'Support',priority:'1',start:'2026-01-06',due:'2026-02-13',status:'Done',team:'Team Sak',by:'Noon',note:'เขียนใบสั่งซื้อ',value:null,valueNote:'',subtasks:[]},
];

async function doImport() {
  if (!token || !siteId || !listId) { log('err', '❌ กรุณา Login ก่อนครับ'); return; }
  log('info', '🚀 เริ่ม Import ' + TASKS.length + ' tasks...');
  var ok = 0, fail = 0;
  for (var i = 0; i < TASKS.length; i++) {
    var t = TASKS[i];
    try {
      await gfetch('/sites/' + siteId + '/lists/' + listId + '/items', 'POST', {
        fields: {
          Title: t.name,
          TaskType: t.type,
          Priority: t.priority,
          StartDate: t.start || null,
          DueDate: t.due || null,
          Status: t.status,
          Team: t.team,
          ActionBy: t.by,
          Note: t.note,
          Value: t.value,
          ValueNote: t.valueNote,
          Subtasks: JSON.stringify(t.subtasks || []),
        }
      });
      log('ok', '✅ (' + (i+1) + '/' + TASKS.length + ') ' + t.name);
      ok++;
    } catch(e) {
      log('err', '❌ (' + (i+1) + '/' + TASKS.length + ') ' + t.name + ' → ' + e.message);
      fail++;
    }
    await new Promise(r => setTimeout(r, 300)); // throttle
  }
  log(fail === 0 ? 'ok' : 'warn', '🏁 เสร็จแล้ว! สำเร็จ: ' + ok + ' | ล้มเหลว: ' + fail);
}
</script>
</body>
</html>
