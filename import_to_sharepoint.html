var SCOPES=['https://graph.microsoft.com/Sites.ReadWrite.All'];
var msalApp=null,token=null,siteId=null,listId=null;

function initMsal(){if(typeof msal==='undefined'){setTimeout(initMsal,100);return;}
  msalApp=new msal.PublicClientApplication({auth:{clientId:SP.clientId,authority:'https://login.microsoftonline.com/'+SP.tenantId,redirectUri:window.location.href.split('?')[0]},cache:{cacheLocation:'localStorage'}});
  log('info','✅ MSAL พร้อม');}
window.addEventListener('load',initMsal);

function log(t,m){var el=document.getElementById('log');el.innerHTML+='<div class="'+t+'">'+m+'</div>';el.scrollTop=el.scrollHeight;}
function clearLog(){document.getElementById('log').innerHTML='';}

async function gfetch(path,method,body){
  var opts={method:method||'GET',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch('https://graph.microsoft.com/v1.0'+path,opts);
  if(!res.ok)throw new Error('HTTP '+res.status+': '+await res.text());
  return res.status===204?null:res.json();
}

async function doLogin(){
  try{
    log('info','🔐 Login...');
    var acc=msalApp.getAllAccounts();
    var r=acc.length>0?await msalApp.acquireTokenSilent({scopes:SCOPES,account:acc[0]}):await msalApp.acquireTokenPopup({scopes:SCOPES});
    token=r.accessToken;
    log('ok','✅ '+msalApp.getAllAccounts()[0].username);
    var h=new URL(SP.siteUrl).hostname, p=new URL(SP.siteUrl).pathname;
    var sd=await gfetch('/sites/'+h+':'+p);
    siteId=sd.id; log('ok','✅ Site OK');
    var ls=await gfetch('/sites/'+siteId+'/lists?$filter=displayName eq \''+SP.listName+'\'');
    if(!ls.value.length){log('err','❌ ไม่พบ List');return;}
    listId=ls.value[0].id; log('ok','✅ List OK');
    log('ok','🎉 พร้อม Import!');
  }catch(e){log('err','❌ '+e.message);}
}

async function doImport(){
  if(!token||!siteId||!listId){log('err','❌ Login ก่อนครับ');return;}
  log('info','🚀 เริ่ม Import '+TASKS.length+' tasks...');
  var ok=0,fail=0;
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i];
    try{
      await gfetch('/sites/'+siteId+'/lists/'+listId+'/items','POST',{fields:{
        Title:t.name,TaskType:t.type,Priority:t.priority,
        StartDate:t.start||null,DueDate:t.due||null,
        Status:t.status,Team:t.team,ActionBy:t.by||'Noon',
        Note:t.note||'',Value:t.value||null,ValueNote:t.valueNote||'',
        Subtasks:JSON.stringify(t.subtasks||[])
      }});
      log('ok','✅ ('+(i+1)+'/'+TASKS.length+') '+t.name); ok++;
    }catch(e){log('err','❌ ('+(i+1)+'/'+TASKS.length+') '+t.name+' — '+e.message); fail++;}
    await new Promise(function(r){setTimeout(r,300);});
  }
  log(fail===0?'ok':'warn','🏁 เสร็จ! สำเร็จ: '+ok+' | ล้มเหลว: '+fail);
}

async function doDeleteAll(){
  if(!token||!siteId||!listId){log('err','❌ Login ก่อนครับ');return;}
  log('info','🗑 กำลังดึงรายการทั้งหมด...');
  try{
    var all=[],url='/sites/'+siteId+'/lists/'+listId+'/items?$select=id&$top=500';
    while(url){
      var data=await gfetch(url);
      all=all.concat(data.value);
      url=data['@odata.nextLink']?data['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0',''):null;
    }
    if(all.length===0){log('warn','⚠️ ไม่มีข้อมูลให้ลบ');return;}
    log('info','🗑 พบ '+all.length+' items — กำลังลบ...');
    for(var i=0;i<all.length;i++){
      await gfetch('/sites/'+siteId+'/lists/'+listId+'/items/'+all[i].id,'DELETE');
      if((i+1)%5===0||i===all.length-1) log('info','🗑 ลบแล้ว '+(i+1)+'/'+all.length);
      await new Promise(function(r){setTimeout(r,200);});
    }
    log('ok','✅ ลบครบ '+all.length+' items แล้ว');
  }catch(e){log('err','❌ ลบผิดพลาด: '+e.message);}
}

async function doDeleteThenImport(){
  if(!token||!siteId||!listId){log('err','❌ Login ก่อนครับ');return;}
  log('info','⚡ Step 1/2 — ลบข้อมูลเก่า...');
  await doDeleteAll();
  log('info','⚡ Step 2/2 — Import ใหม่...');
  log('info','─────────────────────────────');
  await doImport();
}

// ── Render ──────────────────────────────────────────
function renderTable(){
  document.getElementById('task-count').textContent = TASKS.length;
  document.getElementById('total-cnt').textContent  = TASKS.length;
  var tc = {Routine:'bB',Subscription:'bV',Support:'bR',Project:'bG'};
  var sc = {Done:'bG','On Process':'bP','Not Started':''};
  var rows = TASKS.map(function(t,i){
    var ds = t.subtasks.filter(function(s){return s.done;}).map(function(s){return '✅ '+s.label;}).join('<br>');
    var ps = t.subtasks.filter(function(s){return !s.done;}).map(function(s){return '⬜ '+s.label;}).join('<br>');
    return '<tr>'
      +'<td style="color:#6b7280;">'+(i+1)+'</td>'
      +'<td style="font-weight:500;max-width:200px;">'+t.name+'</td>'
      +'<td><span class="badge '+(tc[t.type]||'')+'">'+t.type+'</span></td>'
      +'<td style="text-align:center;">'+t.priority+'</td>'
      +'<td style="white-space:nowrap;">'+(t.start||'—')+'</td>'
      +'<td style="white-space:nowrap;">'+(t.due||'—')+'</td>'
      +'<td><span class="badge '+(sc[t.status]||'')+'">'+t.status+'</span></td>'
      +'<td>'+(t.team||'—')+'</td>'
      +'<td style="color:#9ca3af;max-width:160px;">'+(t.note||'')+'</td>'
      +'<td style="color:#3fb950;">'+(ds||'—')+'</td>'
      +'<td style="color:#f59e0b;">'+(ps||'—')+'</td>'
      +'</tr>';
  });
  document.getElementById('task-tbody').innerHTML = rows.join('');

  var s={Routine:0,Subscription:0,Support:0,Project:0,Done:0,'On Process':0,'Not Started':0};
  TASKS.forEach(function(t){s[t.type]=(s[t.type]||0)+1; s[t.status]=(s[t.status]||0)+1;});
  document.getElementById('stats-bar').innerHTML =
    mkStat(TASKS.length,'Total','#58a6ff')+mkStat(s['Done'],'Done','#3fb950')
    +mkStat(s['On Process'],'On Process','#d29922')+mkStat(s['Not Started'],'Not Started','#9ca3af')
    +mkStat(s['Routine'],'Routine','#60a5fa')+mkStat(s['Subscription'],'Subscription','#a78bfa')
    +mkStat(s['Support'],'Support','#f87171')+mkStat(s['Project'],'Project','#34d399');
}

function mkStat(n,l,c){return '<div class="stat"><div class="stat-n" style="color:'+c+';">'+n+'</div><div class="stat-l">'+l+'</div></div>';}
renderTable();
</script>
